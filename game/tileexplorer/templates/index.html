<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Explorer - Lobby</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #fff;
  padding: 20px;
}
h1 {
  margin-bottom: 16px;
  font-size: 28px;
}

/* User info bar */
.user-bar {
  position: fixed;
  top: 16px;
  right: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 100;
}
.user-bar .username {
  font-size: 14px;
  color: #ccc;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.btn-logout {
  padding: 6px 14px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-logout:hover {
  background: rgba(231, 76, 60, 0.6);
  border-color: #e74c3c;
}

/* Lobby container */
.lobby-container {
  width: 100%;
  max-width: 900px;
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: auto auto;
  gap: 16px;
}

/* Room list - row 1, spanning 4 columns */
.room-list {
  grid-column: 1 / -1;
  grid-row: 1;
  min-height: 140px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid rgba(255,255,255,0.08);
}
.room-list h2 {
  font-size: 16px;
  margin-bottom: 12px;
  color: #ddd;
}
.room-list-empty {
  color: #888;
  text-align: center;
  padding: 40px 20px;
  font-size: 14px;
}
.room-table {
  width: 100%;
  border-collapse: collapse;
}
.room-table th,
.room-table td {
  padding: 10px 12px;
  text-align: left;
  font-size: 14px;
}
.room-table th {
  color: #aaa;
  font-weight: 500;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.room-table tr:not(:last-child) td {
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.room-table td {
  color: #eee;
}
.status-waiting {
  color: #f39c12;
}
.status-playing {
  color: #27ae60;
}

/* Action buttons in room list */
.btn-join,
.btn-spectate {
  padding: 5px 12px;
  border: none;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  color: #fff;
  transition: opacity 0.2s;
}
.btn-join {
  background: #4a90d9;
  margin-right: 6px;
}
.btn-join:hover { opacity: 0.85; }
.btn-join:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-spectate {
  background: #8e44ad;
}
.btn-spectate:hover { opacity: 0.85; }

/* Action buttons row - row 2 */
.actions-row {
  grid-column: 1 / -1;
  grid-row: 2;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.btn {
  padding: 14px 24px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 500;
  color: #fff;
  text-decoration: none;
  text-align: center;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:hover { opacity: 0.9; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-single {
  background: linear-gradient(135deg, #27ae60, #219a52);
  grid-column: 1;
}
.btn-multi {
  background: linear-gradient(135deg, #4a90d9, #357abd);
  grid-column: 2;
}

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active {
  display: flex;
}
.modal {
  background: #1e2a3a;
  border-radius: 12px;
  padding: 32px;
  width: 360px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.modal h3 {
  margin-bottom: 16px;
  font-size: 18px;
}
.modal-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 14px;
  outline: none;
  margin-bottom: 12px;
  transition: border-color 0.3s;
}
.modal-input:focus {
  border-color: #4a90d9;
}
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.modal-btn {
  padding: 8px 18px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  color: #fff;
  transition: opacity 0.2s;
}
.modal-btn:hover { opacity: 0.85; }
.modal-btn-primary {
  background: #4a90d9;
}
.modal-btn-cancel {
  background: rgba(255,255,255,0.15);
}
.modal-error {
  color: #e74c3c;
  font-size: 12px;
  margin-bottom: 8px;
  min-height: 16px;
}

/* Toast notifications */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #e74c3c;
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.visible {
  opacity: 1;
}
</style>
</head>
<body>

<!-- User info bar (top-right) -->
<header class="user-bar" role="banner">
  <span class="username" id="displayUsername" aria-label="Logged in user"></span>
  <button class="btn-logout" id="btnLogout" aria-label="Logout">Logout</button>
</header>

<h1>🎰 Tile Explorer</h1>

<main class="lobby-container" role="main">
  <!-- Row 1: Room list spanning all 4 columns -->
  <section class="room-list" aria-label="Active rooms">
    <h2>Active Rooms</h2>
    <div id="roomListContent">
      <p class="room-list-empty">No active rooms. Create one or wait for others to start a game.</p>
    </div>
  </section>

  <!-- Row 2: Action buttons -->
  <div class="actions-row">
    <a href="/single" class="btn btn-single" role="button">Single Player</a>
    <button class="btn btn-multi" id="btnMultiplayer">Multiplayer</button>
  </div>
</main>

<!-- Join Room Modal -->
<div class="modal-overlay" id="joinModal" role="dialog" aria-modal="true" aria-labelledby="joinModalTitle">
  <div class="modal">
    <h3 id="joinModalTitle">Enter Invitation Code</h3>
    <div class="modal-error" id="joinModalError"></div>
    <input type="text" class="modal-input" id="joinCodeInput"
           placeholder="Enter invitation code" maxlength="20"
           aria-label="Invitation code">
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="joinModalCancel">Cancel</button>
      <button class="modal-btn modal-btn-primary" id="joinModalSubmit">Join</button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function() {
  'use strict';

  // --- Utility ---
  function truncateUsername(name, maxLen) {
    if (!name) return '';
    if (name.length <= maxLen) return name;
    return name.substring(0, maxLen) + '…';
  }

  function showToast(message, duration) {
    duration = duration || 3000;
    var toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('visible');
    setTimeout(function() { toast.classList.remove('visible'); }, duration);
  }

  // --- Username display ---
  var rawUsername = '{{ session.get("username", "") }}';
  var displayName = truncateUsername(rawUsername, 20);
  document.getElementById('displayUsername').textContent = displayName;

  // --- Logout ---
  document.getElementById('btnLogout').addEventListener('click', function() {
    fetch('/auth/logout', { method: 'POST' })
      .then(function() { window.location.href = '/login'; })
      .catch(function() { window.location.href = '/login'; });
  });

  // --- Room list rendering ---
  var currentJoinRoomCode = null;

  function renderRoomList(rooms) {
    var container = document.getElementById('roomListContent');
    if (!rooms || rooms.length === 0) {
      container.innerHTML = '<p class="room-list-empty">No active rooms. Create one or wait for others to start a game.</p>';
      return;
    }

    var html = '<table class="room-table" role="grid">';
    html += '<thead><tr><th>Room</th><th>Status</th><th>Actions</th></tr></thead>';
    html += '<tbody>';

    for (var i = 0; i < rooms.length; i++) {
      var room = rooms[i];
      var playerCount = room.player_count || 1;
      var isFull = playerCount >= 2;
      var statusClass = isFull ? 'status-playing' : 'status-waiting';
      var statusText = playerCount + '/2';
      var alias = truncateUsername(room.alias || 'Unknown', 20);

      html += '<tr>';
      html += '<td>' + escapeHtml(alias) + '</td>';
      html += '<td><span class="' + statusClass + '">' + statusText + '</span></td>';
      html += '<td>';

      // Join button - disabled when full
      if (isFull) {
        html += '<button class="btn-join" disabled title="Room is full">Join</button>';
      } else {
        html += '<button class="btn-join" data-room-code="' + escapeHtml(room.unique_code) + '" onclick="window._openJoinModal(this)">Join</button>';
      }

      // Spectate button - only shown when room has 2 players
      if (isFull) {
        html += '<button class="btn-spectate" data-room-code="' + escapeHtml(room.unique_code) + '" data-requires-invite="' + (room.spectator_requires_invitation ? 'true' : 'false') + '" data-spectator-enabled="' + (room.spectator_access_enabled ? 'true' : 'false') + '" onclick="window._spectateRoom(this)">Spectate</button>';
      }

      html += '</td>';
      html += '</tr>';
    }

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  // --- Fetch rooms ---
  function fetchRooms() {
    fetch('/api/rooms')
      .then(function(resp) { return resp.json(); })
      .then(function(data) {
        renderRoomList(data.rooms || []);
      })
      .catch(function(err) {
        console.error('Failed to fetch rooms:', err);
      });
  }

  // Initial load
  fetchRooms();

  // --- Multiplayer button (create room) ---
  document.getElementById('btnMultiplayer').addEventListener('click', function() {
    var btn = this;
    btn.disabled = true;
    fetch('/api/rooms/create', { method: 'POST' })
      .then(function(resp) { return resp.json().then(function(d) { return { ok: resp.ok, data: d }; }); })
      .then(function(result) {
        if (result.ok && result.data.redirect) {
          window.location.href = result.data.redirect;
        } else {
          showToast(result.data.error || 'Failed to create room');
          btn.disabled = false;
        }
      })
      .catch(function(err) {
        showToast('Network error. Please try again.');
        btn.disabled = false;
      });
  });

  // --- Join modal ---
  var joinModal = document.getElementById('joinModal');
  var joinCodeInput = document.getElementById('joinCodeInput');
  var joinModalError = document.getElementById('joinModalError');

  window._openJoinModal = function(btn) {
    currentJoinRoomCode = btn.getAttribute('data-room-code');
    joinCodeInput.value = '';
    joinModalError.textContent = '';
    joinModal.classList.add('active');
    joinCodeInput.focus();
  };

  document.getElementById('joinModalCancel').addEventListener('click', function() {
    joinModal.classList.remove('active');
    currentJoinRoomCode = null;
  });

  document.getElementById('joinModalSubmit').addEventListener('click', submitJoin);
  joinCodeInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitJoin();
    if (e.key === 'Escape') {
      joinModal.classList.remove('active');
      currentJoinRoomCode = null;
    }
  });

  // Close modal on overlay click
  joinModal.addEventListener('click', function(e) {
    if (e.target === joinModal) {
      joinModal.classList.remove('active');
      currentJoinRoomCode = null;
    }
  });

  function submitJoin() {
    var code = joinCodeInput.value.trim();
    if (!code) {
      joinModalError.textContent = 'Please enter an invitation code.';
      return;
    }
    joinModalError.textContent = '';

    fetch('/api/rooms/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ room_code: currentJoinRoomCode, invitation_code: code })
    })
      .then(function(resp) { return resp.json().then(function(d) { return { ok: resp.ok, data: d }; }); })
      .then(function(result) {
        if (result.ok && result.data.redirect) {
          window.location.href = result.data.redirect;
        } else {
          joinModalError.textContent = result.data.error || 'Failed to join room.';
        }
      })
      .catch(function() {
        joinModalError.textContent = 'Network error. Please try again.';
      });
  }

  // --- Spectate ---
  window._spectateRoom = function(btn) {
    var roomCode = btn.getAttribute('data-room-code');
    var requiresInvite = btn.getAttribute('data-requires-invite') === 'true';
    var spectatorEnabled = btn.getAttribute('data-spectator-enabled') === 'true';

    if (!spectatorEnabled) {
      showToast('Spectator access is disabled for this room.');
      return;
    }

    if (requiresInvite) {
      // Reuse join modal for spectate invitation code
      currentJoinRoomCode = roomCode;
      joinCodeInput.value = '';
      joinModalError.textContent = '';
      document.getElementById('joinModalTitle').textContent = 'Enter Spectator Code';
      document.getElementById('joinModalSubmit').textContent = 'Spectate';
      document.getElementById('joinModalSubmit').onclick = function() {
        submitSpectate(roomCode);
      };
      joinModal.classList.add('active');
      joinCodeInput.focus();
    } else {
      // No invitation code needed
      doSpectate(roomCode, null);
    }
  };

  function submitSpectate(roomCode) {
    var code = joinCodeInput.value.trim();
    if (!code) {
      joinModalError.textContent = 'Please enter the invitation code.';
      return;
    }
    joinModalError.textContent = '';
    doSpectate(roomCode, code);
  }

  function doSpectate(roomCode, invitationCode) {
    var body = { room_code: roomCode };
    if (invitationCode) body.invitation_code = invitationCode;

    fetch('/api/rooms/spectate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
      .then(function(resp) { return resp.json().then(function(d) { return { ok: resp.ok, data: d }; }); })
      .then(function(result) {
        if (result.ok && result.data.redirect) {
          window.location.href = result.data.redirect;
        } else {
          if (joinModal.classList.contains('active')) {
            joinModalError.textContent = result.data.error || 'Failed to spectate.';
          } else {
            showToast(result.data.error || 'Failed to spectate.');
          }
        }
      })
      .catch(function() {
        if (joinModal.classList.contains('active')) {
          joinModalError.textContent = 'Network error. Please try again.';
        } else {
          showToast('Network error. Please try again.');
        }
      });
  }

  // --- WebSocket for real-time room list updates ---
  var socket = io({ transports: ['websocket', 'polling'] });

  socket.on('connect', function() {
    socket.emit('join_lobby');
  });

  socket.on('room_list_update', function(data) {
    if (data && data.rooms) {
      renderRoomList(data.rooms);
    } else {
      fetchRooms();
    }
  });

  socket.on('disconnect', function() {
    // Attempt reconnect is handled by socket.io automatically
  });

  // Reset modal state when it closes (for spectate reuse)
  function resetModalState() {
    document.getElementById('joinModalTitle').textContent = 'Enter Invitation Code';
    document.getElementById('joinModalSubmit').textContent = 'Join';
    document.getElementById('joinModalSubmit').onclick = submitJoin;
  }

  // Override cancel to also reset modal
  var originalCancel = document.getElementById('joinModalCancel').onclick;
  document.getElementById('joinModalCancel').addEventListener('click', resetModalState);
  joinModal.addEventListener('click', function(e) {
    if (e.target === joinModal) resetModalState();
  });

})();
</script>
</body>
</html>
