<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Explorer - Triple Match</title>
<style>
:root {
  --tile-depth-border: 3px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: #fff; padding: 10px; }
h1 { margin-bottom: 4px; font-size: 24px; }
.info { font-size: 14px; color: #aaa; margin-bottom: 8px; }
.slots { display: flex; gap: 6px; margin-bottom: 8px; padding: 8px; background: rgba(255,255,255,0.1); border-radius: 12px; }
.slot { width: 80px; height: 80px; border: 2px dashed rgba(255,255,255,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
.slot img { width: 68px; height: 68px; object-fit: cover; border-radius: 6px; }
.board { position: relative; width: 600px; height: 800px; margin: 0 auto; }
.tile { position: absolute; width: 80px; height: 80px; cursor: pointer; transition: transform 0.2s, opacity 0.3s; border-radius: 12px; overflow: hidden; box-shadow: 2px 2px 0 rgba(255,255,255,0.4), 1px 1px 3px rgba(0,0,0,0.3); border-bottom: var(--tile-depth-border) solid #FFFFFF; border-right: var(--tile-depth-border) solid #FFFFFF; }
.tile:hover { transform: scale(1.05); z-index: 999 !important; }
.tile img { width: 100%; height: 100%; object-fit: cover; }
.tile.blocked { cursor: not-allowed; }
.tile.fly { transition: all 0.4s ease-in-out; }
.win-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(39,174,96,0.95); padding: 30px 50px; border-radius: 12px; font-size: 24px; z-index: 2000; display: none; }
.lose-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(231,76,60,0.95); padding: 30px 50px; border-radius: 12px; font-size: 24px; z-index: 2000; display: none; }
.idle-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(52,73,94,0.97); padding: 30px 50px; border-radius: 12px; font-size: 20px; z-index: 3000; display: none; text-align: center; border: 2px solid #f39c12; }
.idle-modal button { margin-top: 16px; padding: 10px 28px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; background: #f39c12; color: #fff; }
.idle-modal button:hover { background: #e67e22; }
.idle-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2999; display: none; }
button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; background: #4a90d9; color: #fff; margin-top: 12px; }
button:hover { background: #357abd; }
.undo-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: #fff; font-size: 22px; cursor: pointer; margin-top: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.2s; }
.undo-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
</style>
</head>
<body>

<h1>🎰 Tile Explorer</h1>
<div class="user-bar" style="position:fixed;top:16px;right:24px;display:flex;align-items:center;gap:12px;z-index:9999;">
  <span id="coinDisplay" style="display:inline-flex;align-items:center;gap:4px;font-size:14px;color:#FFD700;"><img src="/static/icon/coins.png" style="width:20px;height:20px;vertical-align:middle;"> --</span>
  <span style="font-size:14px;color:#ccc;">{{ username }}</span>
  <button onclick="logout()" style="padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;background:#e74c3c;color:#fff;">Logout</button>
</div>
<div style="position:fixed;top:16px;left:24px;z-index:9999;">
  <button onclick="window.location.href='/'" style="padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);">← Lobby</button>
</div>
<div class="info"><span style="font-weight:bold;color:#fff;">{{ username }}</span> | Level <span id="levelNum">1</span> | Remaining: <span id="remaining">0</span></div>

<div class="slots" id="slots"></div>
<div class="board" id="board"></div>

<!-- Undo button with counter -->
<div style="display:flex;align-items:center;gap:10px;margin-top:16px;">
  <button class="undo-btn" id="undoBtn" onclick="undoTile()" title="Undo last tile">↩</button>
  <span id="undoCount" style="font-size:13px;color:#aaa;">3</span>
</div>

<div class="win-msg" id="winMsg">🎉 Level Complete!<br><button onclick="nextLevel()">Next Level</button></div>
<div class="lose-msg" id="loseMsg">😢 Slots Full!<br><button onclick="restartLevel()">Retry</button></div>

<!-- Ad modal -->
<div class="idle-overlay" id="adOverlay" style="display:none;"></div>
<div class="idle-modal" id="adModal" style="display:none;">
  <p>📺 Watch ad to unlock undo</p>
  <p id="adTimer" style="font-size:24px;font-weight:bold;margin:12px 0;">3</p>
  <p id="adStatus" style="font-size:12px;color:#aaa;">Playing ad...</p>
</div>

<!-- Idle warning modal -->
<div class="idle-overlay" id="idleOverlay"></div>
<div class="idle-modal" id="idleModal">
  <p>⏰ You have been idle.</p>
  <p>Continue playing?</p>
  <button onclick="continuePlaying()">Continue</button>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const MAX_SLOTS = 7;
let tiles = [];
let slots = [];
let gameOver = false;
let currentLevel = 1;
let heartbeatInterval = null;

// Connect to WebSocket in single-player mode (no room_code)
var socket = null;
var undoRemaining = 3;
var undoMaxPerRound = 3;
var adDuration = 3;
var adProviderUrl = '';
var adRewardCount = 1;

// Load undo and ad config
fetch('/api/config')
  .then(function(resp) { return resp.json(); })
  .then(function(cfg) {
    undoMaxPerRound = cfg.undo_max_per_round || 3;
    undoRemaining = undoMaxPerRound;
    updateUndoDisplay();
    var maxAttempts = cfg.reconnect_max_attempts || 3;
    var intervalMs = (cfg.reconnect_interval_seconds || 3) * 1000;
    initSocket(maxAttempts, intervalMs);
  })
  .catch(function() {
    initSocket(3, 3000);
  });

fetch('/api/ads-config')
  .then(function(resp) { return resp.json(); })
  .then(function(cfg) {
    adDuration = cfg.ad_duration_seconds || 3;
    adProviderUrl = cfg.ad_provider_url || '';
    adRewardCount = cfg.undo_reward_count || 1;
  })
  .catch(function() {});

function updateUndoDisplay() {
  document.getElementById('undoCount').textContent = undoRemaining;
}

function initSocket(maxAttempts, intervalMs) {
  socket = io({
    reconnection: true,
    reconnectionAttempts: maxAttempts,
    reconnectionDelay: intervalMs,
    reconnectionDelayMax: intervalMs
  });

  socket.on('connect', function() {
    startHeartbeat();
  });

  socket.on('disconnect', function() {
    stopHeartbeat();
  });

  // Listen on the Manager for reconnect_failed
  socket.io.on('reconnect_failed', function() {
    window.location.href = '/login';
  });

  socket.on('state_update', function(data) {
    tiles = data.tiles || [];
    slots = data.slots || [];
    currentLevel = data.level || 1;
    gameOver = data.game_over || false;

    document.getElementById('levelNum').textContent = currentLevel;
    document.getElementById('remaining').textContent = tiles.length;

    renderBoard();
    renderSlots();

    if (gameOver && tiles.length === 0 && slots.length === 0) {
      document.getElementById('winMsg').style.display = 'block';
      document.getElementById('loseMsg').style.display = 'none';
    } else if (gameOver && slots.length >= MAX_SLOTS) {
      document.getElementById('loseMsg').style.display = 'block';
      document.getElementById('winMsg').style.display = 'none';
    } else {
      document.getElementById('winMsg').style.display = 'none';
      document.getElementById('loseMsg').style.display = 'none';
    }
  });

  socket.on('idle_warning', function(data) {
    document.getElementById('idleOverlay').style.display = 'block';
    document.getElementById('idleModal').style.display = 'block';
  });

  socket.on('idle_clear', function(data) {
    hideIdleModal();
    alert('Your session was cleared due to inactivity. The game will restart at your saved level.');
    window.location.reload();
  });

  socket.on('error', function(data) {
    console.error('Server error:', data.message);
  });
}


// --- Heartbeat ---

function startHeartbeat() {
  stopHeartbeat();
  heartbeatInterval = setInterval(function() {
    socket.emit('heartbeat', {});
  }, 30000); // Every 30 seconds
}

function stopHeartbeat() {
  if (heartbeatInterval) {
    clearInterval(heartbeatInterval);
    heartbeatInterval = null;
  }
}

// --- Idle Modal ---

function continuePlaying() {
  socket.emit('continue_playing', {});
  hideIdleModal();
}

function hideIdleModal() {
  document.getElementById('idleOverlay').style.display = 'none';
  document.getElementById('idleModal').style.display = 'none';
}

// --- Rendering ---

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  tiles.forEach(function(t, idx) {
    const div = document.createElement('div');
    div.className = 'tile';
    div.style.left = t.x + 'px';
    div.style.top = t.y + 'px';
    div.style.zIndex = t.z;
    // Visual depth: upper layers get shadow offset for 3D effect
    const layer = t.layer || 0;
    div.style.boxShadow = (2 + layer * 2) + 'px ' + (2 + layer * 2) + 'px ' + (2 + layer) + 'px rgba(0,0,0,0.35)';
    if (layer > 0) { div.style.borderTop = '1px solid rgba(255,255,255,0.15)'; div.style.borderLeft = '1px solid rgba(255,255,255,0.15)'; }
    div.innerHTML = '<img src="' + t.img + '">';
    div.dataset.idx = idx;

    // A tile is blocked if ANY tile on a HIGHER layer overlaps it
    const isBlocked = tiles.some(function(other, oi) {
      if (oi === idx) return false;
      if ((other.layer || 0) <= layer) return false;
      // Check overlap: tiles overlap if distance < tileSize (80px) in both axes
      return Math.abs(other.x - t.x) < 64 && Math.abs(other.y - t.y) < 64;
    });

    if (isBlocked) {
      div.classList.add('blocked');
    } else {
      div.onclick = function() { clickTile(idx); };
    }
    board.appendChild(div);
  });
}

function renderSlots() {
  const slotsEl = document.getElementById('slots');
  slotsEl.innerHTML = '';
  for (let i = 0; i < MAX_SLOTS; i++) {
    const div = document.createElement('div');
    div.className = 'slot';
    if (slots[i]) {
      div.innerHTML = '<img src="' + slots[i].img + '">';
    }
    slotsEl.appendChild(div);
  }
}

// --- Tile Actions ---

function clickTile(idx) {
  if (gameOver) return;
  if (slots.length >= MAX_SLOTS) return; // Slots full — ignore click (Req 2.2)
  const tile = tiles[idx];
  if (!tile) return;

  // Client-side blocked check (Req 2.3)
  const layer = tile.layer || 0;
  const isBlocked = tiles.some(function(other, oi) {
    if (oi === idx) return false;
    if ((other.layer || 0) <= layer) return false;
    return Math.abs(other.x - tile.x) < 64 && Math.abs(other.y - tile.y) < 64;
  });
  if (isBlocked) return;

  // Send tile action to server — server will respond with state_update
  socket.emit('tile_action', { type: 'select_tile', tile_id: tile.id });
}

function nextLevel() {
  // Server has already advanced the player's level on win.
  // Reload the page to reconnect and get new state at the next level.
  window.location.reload();
}

function restartLevel() {
  // Emit restart_game to clear server state and reinitialize (Req 2.1)
  socket.emit('restart_game', {});
  // Reset undo count for new round
  undoRemaining = undoMaxPerRound;
  updateUndoDisplay();
}

function undoTile() {
  if (slots.length === 0) return;
  // Allow undo even when game_over (slots full) — server handles validation

  if (undoRemaining > 0) {
    undoRemaining--;
    updateUndoDisplay();
    socket.emit('tile_action', { type: 'undo_tile' });
  } else {
    // Show ad to unlock undo
    showAdModal();
  }
}

function showAdModal() {
  document.getElementById('adOverlay').style.display = 'block';
  document.getElementById('adModal').style.display = 'block';
  var remaining = adDuration;
  document.getElementById('adTimer').textContent = remaining;
  document.getElementById('adStatus').textContent = 'Playing ad...';

  var adInterval = setInterval(function() {
    remaining--;
    document.getElementById('adTimer').textContent = remaining;
    if (remaining <= 0) {
      clearInterval(adInterval);
      // Ad complete — reward undo
      undoRemaining = adRewardCount;
      updateUndoDisplay();
      document.getElementById('adStatus').textContent = 'Ad complete! Undo unlocked.';
      setTimeout(function() {
        document.getElementById('adOverlay').style.display = 'none';
        document.getElementById('adModal').style.display = 'none';
      }, 800);
    }
  }, 1000);
}

// Load coins
fetch('/api/coins')
  .then(function(resp) { return resp.json(); })
  .then(function(data) {
    var el = document.getElementById('coinDisplay');
    if (el && data.coins !== undefined) el.innerHTML = '<img src="/static/icon/coins.png" style="width:20px;height:20px;vertical-align:middle;"> ' + data.coins;
  })
  .catch(function() {});

function logout() {
  fetch('/auth/logout', { method: 'POST' }).then(function() {
    window.location.href = '/login';
  });
}
</script>
</body>
</html>
