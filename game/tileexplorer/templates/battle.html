<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Explorer - Battle</title>
<style>
:root {
  --tile-depth-border: 3px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: #fff; padding: 20px; }
h1 { margin-bottom: 8px; font-size: 24px; }

.battle-container { display: flex; width: 100%; max-width: 1100px; gap: 20px; margin-top: 16px; }
.game-area { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; }
.game-area.opponent { opacity: 0.95; }

.player-name { font-size: 16px; font-weight: bold; margin-bottom: 8px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
.info { font-size: 14px; color: #aaa; margin-bottom: 12px; }

.slots { display: flex; gap: 6px; margin-bottom: 16px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; }
.slot { width: 50px; height: 50px; border: 2px dashed rgba(255,255,255,0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
.slot img { width: 42px; height: 42px; object-fit: cover; border-radius: 4px; }

.board { position: relative; width: 420px; height: 560px; }
.tile { position: absolute; width: 50px; height: 50px; cursor: pointer; transition: transform 0.2s, opacity 0.3s; border-radius: 6px; overflow: hidden; box-shadow: 2px 2px 0 rgba(255,255,255,0.4), 1px 1px 3px rgba(0,0,0,0.3); border-bottom: var(--tile-depth-border) solid #FFFFFF; border-right: var(--tile-depth-border) solid #FFFFFF; }
.tile:hover { transform: scale(1.05); z-index: 999 !important; }
.tile img { width: 100%; height: 100%; object-fit: cover; }
.tile.blocked { opacity: 0.6; cursor: not-allowed; }

.opponent .tile { cursor: default; }
.opponent .tile:hover { transform: none; }

.waiting-msg { display: flex; align-items: center; justify-content: center; width: 420px; height: 560px; background: rgba(255,255,255,0.05); border-radius: 12px; font-size: 18px; color: #aaa; text-align: center; }

.controls { margin-top: 20px; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 12px; width: 100%; max-width: 1100px; }
.controls h3 { margin-bottom: 12px; font-size: 16px; }
.control-row { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
.control-row label { font-size: 14px; color: #ccc; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.control-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

.btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; color: #fff; }
.btn-danger { background: #e74c3c; }
.btn-danger:hover { background: #c0392b; }

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 3000; }
.modal { background: #2c3e50; padding: 30px 40px; border-radius: 12px; text-align: center; max-width: 400px; }
.modal h2 { margin-bottom: 16px; font-size: 20px; }
.modal p { margin-bottom: 20px; color: #ccc; font-size: 14px; }
.modal .btn { margin: 0 8px; }
.btn-primary { background: #4a90d9; }
.btn-primary:hover { background: #357abd; }
.btn-secondary { background: #7f8c8d; }
.btn-secondary:hover { background: #6c7a7b; }
</style>
</head>
<body>

<h1>🎰 Tile Explorer - Battle</h1>

<div class="battle-container">
  <!-- Player's game area (left) -->
  <div class="game-area player" id="playerArea">
    <div class="player-name" id="playerName">You</div>
    <div class="info">Level <span id="playerLevel">1</span> | Remaining: <span id="playerRemaining">0</span></div>
    <div class="slots" id="playerSlots"></div>
    <div class="board" id="playerBoard"></div>
  </div>

  <!-- Opponent's game area (right) -->
  <div class="game-area opponent" id="opponentArea">
    <div class="player-name" id="opponentName">Opponent</div>
    <div class="info">Level <span id="opponentLevel">1</span> | Remaining: <span id="opponentRemaining">0</span></div>
    <div class="slots" id="opponentSlots"></div>
    <div class="board" id="opponentBoard">
      <div class="waiting-msg" id="waitingMsg">⏳ Waiting for opponent...</div>
    </div>
  </div>
</div>

<!-- Room Owner Controls -->
<div class="controls" id="ownerControls" style="display:none;">
  <h3>Room Controls</h3>
  <div class="control-row">
    <label>
      <input type="checkbox" id="toggleSpectator" checked>
      Allow spectators
    </label>
    <label>
      <input type="checkbox" id="toggleInvitation" checked>
      Require invitation code for spectators
    </label>
    <button class="btn btn-danger" id="btnDeleteRoom">Delete Room</button>
  </div>
</div>

<!-- Idle Warning Modal -->
<div class="modal-overlay" id="idleModal">
  <div class="modal">
    <h2>Are you still there?</h2>
    <p>You have been idle. Click below to continue playing.</p>
    <button class="btn btn-primary" id="btnContinue">Continue Playing</button>
  </div>
</div>

<!-- Room Closed Modal -->
<div class="modal-overlay" id="closedModal">
  <div class="modal">
    <h2>Room Closed</h2>
    <p id="closedReason">This room has been closed.</p>
    <button class="btn btn-primary" onclick="window.location.href='/'">Back to Lobby</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const ROOM_CODE = "{{ room_code }}";
const MAX_SLOTS = 7;

let socket = null;
let heartbeatInterval = null;
let isOwner = false;
let gameStarted = false;

// Truncate username to 20 chars with ellipsis
function truncateUsername(name) {
  if (!name) return '';
  if (name.length > 20) return name.substring(0, 20) + '…';
  return name;
}

// Render a game board (tiles array) into a board element
function renderBoard(boardEl, tiles, clickable) {
  boardEl.innerHTML = '';
  if (!tiles || tiles.length === 0) return;

  tiles.forEach((t, idx) => {
    const div = document.createElement('div');
    div.className = 'tile';
    div.style.left = t.x + 'px';
    div.style.top = t.y + 'px';
    div.style.zIndex = t.z || 0;

    const layer = t.layer || 0;
    div.style.boxShadow = `${2+layer*2}px ${2+layer*2}px ${2+layer}px rgba(0,0,0,0.35)`;
    if (layer > 0) div.style.border = '1px solid rgba(255,255,255,0.15)';

    div.innerHTML = '<img src="' + t.img + '">';

    // Check if tile is blocked by higher layer tiles
    const isBlocked = tiles.some((other, oi) => {
      if (oi === idx) return false;
      if ((other.layer || 0) <= layer) return false;
      return Math.abs(other.x - t.x) < 40 && Math.abs(other.y - t.y) < 40;
    });

    if (isBlocked) {
      div.classList.add('blocked');
    } else if (clickable) {
      div.onclick = () => onTileClick(t.id);
    }

    boardEl.appendChild(div);
  });
}

// Render slots into a slots element
function renderSlots(slotsEl, slots) {
  slotsEl.innerHTML = '';
  for (let i = 0; i < MAX_SLOTS; i++) {
    const div = document.createElement('div');
    div.className = 'slot';
    if (slots && slots[i]) {
      div.innerHTML = '<img src="' + slots[i].img + '">';
    }
    slotsEl.appendChild(div);
  }
}

// Handle tile click on player's board
function onTileClick(tileId) {
  if (!socket || !gameStarted) return;
  socket.emit('tile_action', { type: 'select_tile', tile_id: tileId });
}

// Update player's game area with state data
function updatePlayerState(state) {
  if (!state) return;
  document.getElementById('playerLevel').textContent = state.level || 1;
  document.getElementById('playerRemaining').textContent = state.remaining || 0;
  renderBoard(document.getElementById('playerBoard'), state.tiles, true);
  renderSlots(document.getElementById('playerSlots'), state.slots);
}

// Update opponent's game area with state data
function updateOpponentState(state) {
  if (!state) return;
  document.getElementById('opponentLevel').textContent = state.level || 1;
  document.getElementById('opponentRemaining').textContent = state.remaining || 0;
  // Hide waiting message
  const waitingMsg = document.getElementById('waitingMsg');
  if (waitingMsg) waitingMsg.style.display = 'none';
  renderBoard(document.getElementById('opponentBoard'), state.tiles, false);
  renderSlots(document.getElementById('opponentSlots'), state.slots);
}

// Connect to WebSocket
function connectSocket() {
  socket = io({
    query: { room_code: ROOM_CODE, role: 'player' }
  });

  socket.on('connect', () => {
    console.log('Connected to battle room:', ROOM_CODE);
    startHeartbeat();
  });

  socket.on('disconnect', () => {
    console.log('Disconnected from battle room');
    stopHeartbeat();
  });

  socket.on('waiting_for_opponent', () => {
    // Show waiting message in opponent area
    const waitingMsg = document.getElementById('waitingMsg');
    if (waitingMsg) waitingMsg.style.display = 'flex';
    // If we receive this, we are the owner
    isOwner = true;
    document.getElementById('ownerControls').style.display = 'block';
  });

  socket.on('player_joined', (data) => {
    if (data && data.username) {
      document.getElementById('opponentName').textContent = truncateUsername(data.username);
    }
  });

  socket.on('game_start', (data) => {
    gameStarted = true;
    // Hide waiting message
    const waitingMsg = document.getElementById('waitingMsg');
    if (waitingMsg) waitingMsg.style.display = 'none';

    // Set opponent name
    if (data.opponent_name) {
      document.getElementById('opponentName').textContent = truncateUsername(data.opponent_name);
    }

    // Render both game boards
    updatePlayerState(data.own_state);
    updateOpponentState(data.opponent_state);
  });

  socket.on('state_update', (data) => {
    updatePlayerState(data);
  });

  socket.on('opponent_update', (data) => {
    updateOpponentState(data);
  });

  socket.on('idle_warning', (data) => {
    // Show idle warning modal
    document.getElementById('idleModal').style.display = 'flex';
  });

  socket.on('idle_clear', () => {
    // Redirect to home
    window.location.href = '/';
  });

  socket.on('room_closed', (data) => {
    // Show room closed modal
    const reason = (data && data.reason) ? data.reason : 'This room has been closed.';
    document.getElementById('closedReason').textContent = reason;
    document.getElementById('closedModal').style.display = 'flex';
  });

  socket.on('spectator_kicked', (data) => {
    window.location.href = '/';
  });

  socket.on('error', (data) => {
    console.error('Socket error:', data && data.message);
  });
}

// Heartbeat every 30 seconds
function startHeartbeat() {
  stopHeartbeat();
  heartbeatInterval = setInterval(() => {
    if (socket && socket.connected) {
      socket.emit('heartbeat', {});
    }
  }, 30000);
}

function stopHeartbeat() {
  if (heartbeatInterval) {
    clearInterval(heartbeatInterval);
    heartbeatInterval = null;
  }
}

// Continue playing button handler
document.getElementById('btnContinue').addEventListener('click', () => {
  document.getElementById('idleModal').style.display = 'none';
  if (socket && socket.connected) {
    socket.emit('continue_playing', {});
  }
});

// Room owner controls
document.getElementById('toggleSpectator').addEventListener('change', (e) => {
  fetch(`/api/rooms/${ROOM_CODE}/settings`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ spectator_access_enabled: e.target.checked })
  });
});

document.getElementById('toggleInvitation').addEventListener('change', (e) => {
  fetch(`/api/rooms/${ROOM_CODE}/settings`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ spectator_requires_invitation: e.target.checked })
  });
});

document.getElementById('btnDeleteRoom').addEventListener('click', () => {
  if (!confirm('Are you sure you want to delete this room?')) return;
  fetch(`/api/rooms/${ROOM_CODE}/delete`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' }
  }).then(resp => {
    if (resp.ok) {
      window.location.href = '/';
    }
  });
});

// Initialize
connectSocket();
</script>
</body>
</html>
