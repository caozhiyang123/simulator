<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎰</text></svg>">
<title>Distributed Simulator Control Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #333; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; color: #1a1a2e; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 1200px; margin: 0 auto; }
  .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .card h2 { font-size: 15px; color: #555; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
  .full-width { grid-column: 1 / -1; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
  input[type="number"], input[type="text"], select {
    width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 8px;
  }
  input[type="number"]:focus, input[type="text"]:focus, select:focus { outline: none; border-color: #4a90d9; }
  button {
    padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; color: #fff; margin: 2px;
  }
  button:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .btn-primary { background: #4a90d9; }
  .btn-primary:hover { background: #357abd; }
  .btn-success { background: #27ae60; }
  .btn-success:hover { background: #1e8449; }
  .btn-danger { background: #e74c3c; }
  .btn-danger:hover { background: #c0392b; }
  .btn-warning { background: #f39c12; }
  .btn-warning:hover { background: #d68910; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px; }
  .row > * { flex: 1; }
  .row > button { flex: none; }
  #log { background: #1e1e2e; color: #a6e3a1; padding: 12px; border-radius: 6px; font-family: "Cascadia Code", monospace; font-size: 12px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  .node-card { border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px; margin-bottom: 8px; }
  .node-card .name { font-weight: 600; font-size: 14px; }
  .node-card .status { font-size: 12px; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-left: 6px; }
  .status-idle { background: #eee; color: #888; }
  .status-running { background: #d4edda; color: #155724; }
  .status-completed { background: #cce5ff; color: #004085; }
  .status-error { background: #f8d7da; color: #721c24; }
  .pct-inputs { margin-top: 8px; }
  .pct-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 13px; }
  .pct-row input { width: 80px; margin-bottom: 0; }
  .pct-row span { min-width: 140px; }
  .worker-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .worker-item span { font-size: 13px; }
  .result-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  .result-table th, .result-table td { border: 1px solid #ddd; padding: 5px 8px; text-align: left; }
  .result-table th { background: #f0f0f0; }
  .hidden { display: none; }
</style>
</head>
<body>

<h1>🎰 Distributed Simulator Control Panel</h1>

<div class="grid">

  <!-- Batch Start -->
  <div class="card">
    <h2>📦 Batch Start</h2>
    <label>Game</label>
    <select id="batchGameName" class="game-select"></select>
    <label>Total Spins</label>
    <input type="number" id="totalSpins" value="1000000" min="1">
    <label>Select nodes for batch execution</label>
    <div id="batchNodeCheckboxes" style="margin-bottom:8px;"></div>
    <button class="btn-success" id="batchStartBtn" onclick="startBatch()">▶ Start (batch)</button>
    <button class="btn-danger" id="batchStopBtn" onclick="stopBatchSelected()" disabled>⏹ Stop (batch)</button>
    <div id="batchStopButtons" style="margin-top:8px;"></div>
  </div>

  <!-- Single Start -->
  <div class="card">
    <h2>🚀 Single Start</h2>
    <label>Game</label>
    <select id="singleGameName" class="game-select"></select>
    <div class="row">
      <div>
        <label>Spins</label>
        <input type="number" id="singleSpins" value="100000" min="1">
      </div>
    </div>
    <button class="btn-primary" id="masterStartBtn" onclick="startMaster()">Start Master</button>
    <button class="btn-danger btn-sm" id="masterStopBtn" onclick="stopMaster()" disabled>⏹ Stop Master</button>
    <div id="workerButtons" style="margin-top:8px;"></div>
  </div>

  <!-- Configuration -->
  <div class="card">
    <h2>⚙️ Configuration</h2>
    <label>Poll Interval (seconds)</label>
    <div class="row">
      <input type="number" id="pollInterval" value="2" min="0.5" step="0.5">
      <button class="btn-primary" onclick="setPollInterval()">Set</button>
    </div>
    <label>Allocation Mode</label>
    <div class="row">
      <select id="allocationMode" onchange="onModeChange()">
        <option value="vcpu">vCPU Mode</option>
        <option value="percentage">Percentage Mode</option>
      </select>
      <button class="btn-primary" onclick="setAllocationMode()">Apply</button>
    </div>
    <div id="percentageSection" class="hidden">
      <label>Node Percentages (must sum to 100%)</label>
      <div id="percentageInputs" class="pct-inputs"></div>
      <button class="btn-warning btn-sm" onclick="savePercentages()" style="margin-top:4px;">Save Percentages</button>
    </div>
  </div>

  <!-- Worker Management -->
  <div class="card">
    <h2>👷 Worker Management</h2>
    <div class="row">
      <div>
        <label>New Worker (IP:PORT)</label>
        <input type="text" id="newWorkerAddr" placeholder="192.168.1.2:5001">
      </div>
      <div>
        <label>vCPU</label>
        <input type="number" id="newWorkerVcpu" value="1" min="1" style="width:70px;">
      </div>
      <button class="btn-success" onclick="addWorker()">Add</button>
    </div>
    <div id="workerList"></div>
  </div>

  <!-- Status & Results -->
  <div class="card full-width">
    <h2>📊 Status & Results</h2>
    <button class="btn-primary" onclick="getStatus()">Get Status</button>
    <button class="btn-warning btn-sm" onclick="toggleAutoRefresh()" id="autoRefreshBtn">Enable Auto Refresh</button>
    <div id="statusArea" style="margin-top:12px;"></div>
  </div>

  <!-- Simulator Output -->
  <div class="card full-width">
    <h2>🖥 Simulator Output</h2>
    <button class="btn-primary btn-sm" onclick="fetchAllLogs()">Refresh All Logs</button>
    <button class="btn-warning btn-sm" onclick="toggleAutoLogs()" id="autoLogsBtn">Enable Auto Refresh</button>
    <div id="logTabs" style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;"></div>
    <div id="logPanels" style="margin-top:8px;"></div>
  </div>

  <!-- Operation Log -->
  <div class="card full-width">
    <h2>📝 Operation Log</h2>
    <div id="log">Waiting for operations...</div>
  </div>

</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let nodes = [];          // [{addr, vcpu, percentage}, ...]
let autoRefreshTimer = null;
let autoLogsTimer = null;
let logSinceMap = {};  // {nodeKey: sinceLineNumber}
let activeLogTab = 'master';

// ---------------------------------------------------------------------------
// Logging
// ---------------------------------------------------------------------------
function log(msg) {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString();
  el.textContent += '\n[' + ts + '] ' + msg;
  el.scrollTop = el.scrollHeight;
}

// ---------------------------------------------------------------------------
// Alert helper (reusable)
// ---------------------------------------------------------------------------
function showAlert(message) {
  alert(message);
}

// ---------------------------------------------------------------------------
// Button state management (start/stop互斥)
// ---------------------------------------------------------------------------
let runningNodes = {};  // {nodeAddr: true/false}

function setNodeRunning(addr, running) {
  runningNodes[addr] = running;
  updateButtonStates();
}

function updateButtonStates() {
  // Batch start/stop: based on selected nodes' running state
  var batchStartBtn = document.getElementById('batchStartBtn');
  var batchStopBtn = document.getElementById('batchStopBtn');
  if (batchStartBtn && batchStopBtn) {
    var cbs = document.querySelectorAll('.batch-node-cb:checked');
    var anySelectedRunning = false;
    cbs.forEach(function(cb) {
      if (runningNodes[cb.value]) anySelectedRunning = true;
    });
    batchStartBtn.disabled = anySelectedRunning;
    batchStopBtn.disabled = !anySelectedRunning;
  }

  // Master start/stop
  var masterStartBtn = document.getElementById('masterStartBtn');
  var masterStopBtn = document.getElementById('masterStopBtn');
  if (masterStartBtn) masterStartBtn.disabled = !!runningNodes['master'];
  if (masterStopBtn) masterStopBtn.disabled = !runningNodes['master'];

  // Worker start/stop buttons
  nodes.forEach(function(n) {
    if (n.addr === 'master') return;
    var safeAddr = n.addr.replace(/[:.]/g, '_');
    var startBtn = document.getElementById('workerStartBtn_' + safeAddr);
    var stopBtn = document.getElementById('workerStopBtn_' + safeAddr);
    if (startBtn) startBtn.disabled = !!runningNodes[n.addr];
    if (stopBtn) stopBtn.disabled = !runningNodes[n.addr];
  });
}

// ---------------------------------------------------------------------------
// API helpers
// ---------------------------------------------------------------------------
async function api(url, method, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(url, opts);
    const data = await res.json();
    if (!res.ok) {
      log('❌ ' + method + ' ' + url + ' → ' + res.status + ': ' + JSON.stringify(data));
    }
    return { ok: res.ok, status: res.status, data };
  } catch (e) {
    log('❌ Request failed: ' + url + ' → ' + e.message);
    return { ok: false, status: 0, data: { error: e.message } };
  }
}

// ---------------------------------------------------------------------------
// Batch start
// ---------------------------------------------------------------------------
async function startBatch() {
  const spins = parseInt(document.getElementById('totalSpins').value);
  if (!spins || spins <= 0) { showAlert('Please enter a valid Spins value'); return; }
  const mode = document.getElementById('allocationMode').value;
  const gameName = document.getElementById('batchGameName').value;
  if (!gameName) { showAlert('Please select a game'); return; }
  const checkboxes = document.querySelectorAll('.batch-node-cb:checked');
  const selectedNodes = Array.from(checkboxes).map(function(cb) { return cb.value; });
  if (selectedNodes.length === 0) { showAlert('Please select at least one simulator'); return; }
  log('🚀 Batch start: game=' + gameName + ', spins=' + spins + ', mode=' + mode + ', nodes=' + selectedNodes.join(','));
  const r = await api('/start', 'POST', { total_spins: spins, mode, game_name: gameName, selected_nodes: selectedNodes });
  if (r.ok) {
    log('✅ Batch start completed: ' + r.data.status);
    if (r.data.results) {
      r.data.results.forEach(function(n) {
        if (n.success) setNodeRunning(n.node, true);
        log('   ' + n.node + ': ' + (n.success ? '成功' : '失败') +
            (n.retries ? ' (重试' + n.retries + '次)' : '') +
            (n.error ? ' - ' + n.error : ''));
      });
    }
  }
}

// ---------------------------------------------------------------------------
// Single start: Master
// ---------------------------------------------------------------------------
async function startMaster() {
  const spins = parseInt(document.getElementById('singleSpins').value);
  if (!spins || spins <= 0) { showAlert('Please enter a valid Spins value'); return; }
  const gameName = document.getElementById('singleGameName').value;
  if (!gameName) { showAlert('Please select a game'); return; }
  log('🚀 Start Master: game=' + gameName + ', spins=' + spins);
  const r = await api('/start-master', 'POST', { spins, game_name: gameName });
  if (r.ok) { log('✅ ' + r.data.message); setNodeRunning('master', true); }
}

// ---------------------------------------------------------------------------
// Single start: Worker
// ---------------------------------------------------------------------------
async function startWorker(addr) {
  const spins = parseInt(document.getElementById('singleSpins').value);
  if (!spins || spins <= 0) { showAlert('Please enter a valid Spins value'); return; }
  const gameName = document.getElementById('singleGameName').value;
  if (!gameName) { showAlert('Please select a game'); return; }
  log('🚀 Start Worker ' + addr + ': game=' + gameName + ', spins=' + spins);
  const r = await api('/start-worker', 'POST', { worker_addr: addr, spins, game_name: gameName });
  if (r.ok) { log('✅ Worker ' + addr + ' start request sent'); setNodeRunning(addr, true); }
}

// ---------------------------------------------------------------------------
// Status
// ---------------------------------------------------------------------------
async function getStatus() {
  const r = await api('/status', 'GET');
  if (!r.ok) return;
  renderStatus(r.data);
}

function renderStatus(data) {
  const area = document.getElementById('statusArea');
  let html = '<div style="margin-bottom:8px;font-weight:600;">Overall Status: <span class="status status-' +
    data.overall_status + '">' + data.overall_status + '</span></div>';

  // Node cards
  if (data.nodes && data.nodes.length) {
    html += '<div>';
    data.nodes.forEach(function(n) {
      html += '<div class="node-card">';
      html += '<span class="name">' + n.name + '</span>';
      html += '<span class="status status-' + n.status + '">' + n.status + '</span>';
      if (n.progress !== null && n.progress !== undefined) {
        html += ' <span style="font-size:12px;color:#666;">Progress: ' + n.progress + '</span>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  // Merged result
  if (data.merged_result) {
    const m = data.merged_result;
    html += '<h3 style="margin-top:12px;font-size:14px;">📈 Merged Results</h3>';
    html += '<table class="result-table"><tr><th>Metric</th><th>Value</th></tr>';
    html += '<tr><td>Total Spins</td><td>' + fmt(m.spins) + '</td></tr>';
    html += '<tr><td>Total Spent</td><td>' + fmt(m.total_spent) + '</td></tr>';
    html += '<tr><td>Total Win</td><td>' + fmt(m.total_win) + '</td></tr>';
    html += '<tr><td>TOTAL RTP</td><td>' + fmtPct(m.TOTAL_RTP) + '</td></tr>';
    html += '<tr><td>Base Spent</td><td>' + fmt(m.base_spent) + '</td></tr>';
    html += '<tr><td>Base Win</td><td>' + fmt(m.base_win) + '</td></tr>';
    html += '<tr><td>BASE RTP</td><td>' + fmtPct(m.BASE_RTP) + '</td></tr>';
    html += '<tr><td>EB Spent</td><td>' + fmt(m.eb_spent) + '</td></tr>';
    html += '<tr><td>EB Win</td><td>' + fmt(m.eb_win) + '</td></tr>';
    html += '<tr><td>EB RTP</td><td>' + fmtPct(m.EB_RTP) + '</td></tr>';
    html += '</table>';

    if (m.SPIN_DISTRIBUTION) {
      html += '<h3 style="margin-top:8px;font-size:14px;">Spin 分布</h3>';
      html += '<table class="result-table"><tr><th>节点</th><th>Spins</th></tr>';
      for (const [node, spins] of Object.entries(m.SPIN_DISTRIBUTION)) {
        html += '<tr><td>' + node + '</td><td>' + fmt(spins) + '</td></tr>';
      }
      html += '</table>';
    }

    if (m.missing_nodes && m.missing_nodes.length) {
      html += '<div style="color:#e74c3c;margin-top:6px;font-size:13px;">⚠️ Missing nodes: ' +
        m.missing_nodes.join(', ') + '</div>';
    }
  }

  area.innerHTML = html;
}

function fmt(v) {
  if (v === null || v === undefined) return '-';
  return typeof v === 'number' ? v.toLocaleString() : v;
}

function fmtPct(v) {
  if (v === null || v === undefined) return '-';
  return (v * 100).toFixed(4) + '%';
}

// ---------------------------------------------------------------------------
// Auto refresh
// ---------------------------------------------------------------------------
function toggleAutoRefresh() {
  const btn = document.getElementById('autoRefreshBtn');
  if (autoRefreshTimer) {
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = null;
    btn.textContent = 'Enable Auto Refresh';
    log('⏸ Auto refresh disabled');
  } else {
    const interval = parseFloat(document.getElementById('pollInterval').value) || 2;
    autoRefreshTimer = setInterval(getStatus, interval * 1000);
    btn.textContent = 'Disable Auto Refresh';
    log('▶ Auto refresh enabled (interval ' + interval + 's)');
    getStatus();
  }
}

// ---------------------------------------------------------------------------
// Poll interval
// ---------------------------------------------------------------------------
async function setPollInterval() {
  const val = parseFloat(document.getElementById('pollInterval').value);
  if (!val || val <= 0) { log('⚠️ Please enter a valid poll interval'); return; }
  log('⚙️ Set poll interval: ' + val + 's');
  const r = await api('/config/poll-interval', 'POST', { interval: val });
  if (r.ok) log('✅ Poll interval updated to ' + r.data.interval + 's');
}

// ---------------------------------------------------------------------------
// Allocation mode
// ---------------------------------------------------------------------------
function onModeChange() {
  const mode = document.getElementById('allocationMode').value;
  const section = document.getElementById('percentageSection');
  if (mode === 'percentage') {
    section.classList.remove('hidden');
    renderPercentageInputs();
  } else {
    section.classList.add('hidden');
  }
}

async function setAllocationMode() {
  const mode = document.getElementById('allocationMode').value;
  log('⚙️ Switch allocation mode: ' + mode);
  const r = await api('/config/allocation-mode', 'POST', { mode });
  if (r.ok) log('✅ Allocation mode switched to ' + r.data.mode);
}

function renderPercentageInputs() {
  const container = document.getElementById('percentageInputs');
  let html = '';
  nodes.forEach(function(n) {
    const label = n.addr === 'master' ? 'Master' : 'Worker(' + n.addr + ')';
    html += '<div class="pct-row">';
    html += '<span>' + label + '</span>';
    html += '<input type="number" class="pct-input" data-addr="' + n.addr +
            '" value="' + (n.percentage || 0) + '" min="0" max="100" step="0.1">';
    html += '<span>%</span>';
    html += '</div>';
  });
  container.innerHTML = html;
}

async function savePercentages() {
  const inputs = document.querySelectorAll('.pct-input');
  const percentages = {};
  inputs.forEach(function(inp) {
    percentages[inp.dataset.addr] = parseFloat(inp.value) || 0;
  });
  const sum = Object.values(percentages).reduce(function(a, b) { return a + b; }, 0);
  if (Math.abs(sum - 100) > 0.01) {
    log('⚠️ Percentages sum to ' + sum.toFixed(2) + '%, must be 100%');
    return;
  }
  log('⚙️ Save percentage config');
  const r = await api('/config/percentages', 'POST', { percentages });
  if (r.ok) log('✅ Percentage config saved');
}

// ---------------------------------------------------------------------------
// Worker management
// ---------------------------------------------------------------------------
async function addWorker() {
  const addr = document.getElementById('newWorkerAddr').value.trim();
  const vcpu = parseInt(document.getElementById('newWorkerVcpu').value) || 1;
  if (!addr) { log('⚠️ Please enter Worker address'); return; }
  log('➕ Add Worker: ' + addr + ' (vCPU=' + vcpu + ')');
  const r = await api('/add_worker', 'POST', { addr, vcpu });
  if (r.ok) {
    log('✅ Worker ' + addr + ' added');
    document.getElementById('newWorkerAddr').value = '';
    nodes = r.data.workers;
    renderWorkers();
    renderPercentageInputs();
  }
}

async function delWorker(addr) {
  if (!confirm('Delete Worker ' + addr + '?')) return;
  log('➖ Delete Worker: ' + addr);
  const r = await api('/del_worker', 'POST', { addr });
  if (r.ok) {
    log('✅ Worker ' + addr + ' deleted');
    nodes = r.data.workers;
    renderWorkers();
    renderPercentageInputs();
  }
}

function renderWorkers() {
  // Worker list with delete buttons
  const listEl = document.getElementById('workerList');
  let listHtml = '';
  nodes.forEach(function(n) {
    if (n.addr === 'master') return;
    listHtml += '<div class="worker-item">';
    listHtml += '<span>🖥 ' + n.addr + ' (vCPU: ' + n.vcpu + ')</span>';
    listHtml += '<button class="btn-danger btn-sm" onclick="delWorker(\'' + n.addr + '\')">Delete</button>';
    listHtml += '</div>';
  });
  listEl.innerHTML = listHtml || '<span style="font-size:13px;color:#999;">No Workers</span>';

  // Worker start + stop buttons (single start section)
  const btnEl = document.getElementById('workerButtons');
  let btnHtml = '';
  nodes.forEach(function(n) {
    if (n.addr === 'master') return;
    var safeAddr = n.addr.replace(/[:.]/g, '_');
    btnHtml += '<div style="margin-bottom:4px;">';
    btnHtml += '<button class="btn-primary btn-sm" id="workerStartBtn_' + safeAddr + '" onclick="startWorker(\'' + n.addr + '\')">Start Worker(' + n.addr + ')</button> ';
    btnHtml += '<button class="btn-danger btn-sm" id="workerStopBtn_' + safeAddr + '" onclick="stopWorker(\'' + n.addr + '\')" disabled>⏹ Stop</button>';
    btnHtml += '</div>';
  });
  btnEl.innerHTML = btnHtml || '<span style="font-size:13px;color:#999;">No Workers</span>';

  // Batch stop buttons
  const batchStopEl = document.getElementById('batchStopButtons');
  let batchHtml = '<button class="btn-danger btn-sm" onclick="stopMaster()">⏹ Stop Master</button> ';
  nodes.forEach(function(n) {
    if (n.addr === 'master') return;
    batchHtml += '<button class="btn-danger btn-sm" onclick="stopWorker(\'' + n.addr + '\')">⏹ Stop ' + n.addr + '</button> ';
  });
  batchStopEl.innerHTML = batchHtml;

  // Batch node checkboxes
  const cbEl = document.getElementById('batchNodeCheckboxes');
  let cbHtml = '';
  nodes.forEach(function(n) {
    var label = n.addr === 'master' ? 'Master' : 'Worker(' + n.addr + ')';
    cbHtml += '<label style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:13px;cursor:pointer;">';
    cbHtml += '<input type="checkbox" class="batch-node-cb" value="' + n.addr + '">';
    cbHtml += label + '</label>';
  });
  cbEl.innerHTML = cbHtml;
  // Update button states when checkboxes change
  cbEl.querySelectorAll('.batch-node-cb').forEach(function(cb) {
    cb.addEventListener('change', updateButtonStates);
  });
  updateButtonStates();

  // Refresh log tabs
  renderLogTabs();
}

// ---------------------------------------------------------------------------
// Stop
// ---------------------------------------------------------------------------
async function stopMaster() {
  log('⏹ Stop Master');
  const r = await api('/stop-master', 'POST', {});
  if (r.ok) { log('✅ ' + r.data.message); setNodeRunning('master', false); }
  else log('❌ ' + (r.data.message || r.data.error || 'Stop failed'));
}

async function stopWorker(addr) {
  log('⏹ Stop Worker ' + addr);
  const r = await api('/stop-worker', 'POST', { worker_addr: addr });
  if (r.ok) { log('✅ Worker ' + addr + ' stopped'); setNodeRunning(addr, false); }
  else log('❌ ' + (r.data.message || r.data.error || 'Stop failed'));
}

async function stopBatchSelected() {
  const checkboxes = document.querySelectorAll('.batch-node-cb:checked');
  const selectedNodes = Array.from(checkboxes).map(function(cb) { return cb.value; });
  if (selectedNodes.length === 0) { showAlert('Please select at least one simulator'); return; }
  log('⏹ Batch stop: ' + selectedNodes.join(', '));
  for (var i = 0; i < selectedNodes.length; i++) {
    var addr = selectedNodes[i];
    if (addr === 'master') {
      await stopMaster();
    } else {
      await stopWorker(addr);
    }
  }
  log('✅ Batch stop completed');
}

// ---------------------------------------------------------------------------
// Simulator logs (per-node)
// ---------------------------------------------------------------------------
function getLogNodes() {
  var list = ['master'];
  nodes.forEach(function(n) { if (n.addr !== 'master') list.push(n.addr); });
  return list;
}

function renderLogTabs() {
  var tabsEl = document.getElementById('logTabs');
  var panelsEl = document.getElementById('logPanels');
  var logNodes = getLogNodes();

  // Only rebuild panels if node list changed
  var existingPanels = panelsEl.querySelectorAll('[data-log-node]');
  var existingKeys = Array.from(existingPanels).map(function(el) { return el.dataset.logNode; });
  var needsRebuild = logNodes.length !== existingKeys.length ||
    logNodes.some(function(k, i) { return k !== existingKeys[i]; });

  if (needsRebuild) {
    var panelsHtml = '';
    logNodes.forEach(function(key) {
      var display = key === activeLogTab ? 'block' : 'none';
      panelsHtml += '<div id="' + safeId(key) + '" data-log-node="' + key + '" style="display:' + display +
        ';background:#1e1e2e;color:#cdd6f4;padding:12px;border-radius:6px;font-family:\'Cascadia Code\',monospace;font-size:12px;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;">Waiting for simulator...</div>';
    });
    panelsEl.innerHTML = panelsHtml;
    logSinceMap = {};
  } else {
    // Just toggle visibility
    logNodes.forEach(function(key) {
      var el = document.getElementById(safeId(key));
      if (el) el.style.display = key === activeLogTab ? 'block' : 'none';
    });
  }

  // Always rebuild tabs (lightweight)
  var tabsHtml = '';
  logNodes.forEach(function(key) {
    var label = key === 'master' ? 'Master' : 'Worker(' + key + ')';
    var cls = key === activeLogTab ? 'btn-primary btn-sm' : 'btn-sm';
    tabsHtml += '<button class="' + cls + '" onclick="switchLogTab(\'' + key + '\')">' + label + '</button>';
  });
  tabsEl.innerHTML = tabsHtml;
}

function switchLogTab(key) {
  activeLogTab = key;
  // Just toggle display, don't rebuild panels
  var logNodes = getLogNodes();
  logNodes.forEach(function(k) {
    var el = document.getElementById(safeId(k));
    if (el) el.style.display = k === key ? 'block' : 'none';
  });
  // Rebuild tab buttons for active highlight
  var tabsEl = document.getElementById('logTabs');
  var tabsHtml = '';
  logNodes.forEach(function(k) {
    var label = k === 'master' ? 'Master' : 'Worker(' + k + ')';
    var cls = k === key ? 'btn-primary btn-sm' : 'btn-sm';
    tabsHtml += '<button class="' + cls + '" onclick="switchLogTab(\'' + k + '\')">' + label + '</button>';
  });
  tabsEl.innerHTML = tabsHtml;
  fetchNodeLogs(key);
}

function safeId(key) { return 'logPanel_' + key.replace(/[:.]/g, '_'); }

async function fetchNodeLogs(key) {
  var since = logSinceMap[key] || 0;
  var r;
  if (key === 'master') {
    r = await api('/logs?since=' + since, 'GET');
  } else {
    r = await api('/logs/worker?addr=' + encodeURIComponent(key) + '&since=' + since, 'GET');
  }
  if (!r.ok) return;
  var el = document.getElementById(safeId(key));
  if (!el) return;
  if (r.data.lines && r.data.lines.length > 0) {
    if (since === 0) el.textContent = '';
    r.data.lines.forEach(function(line) { el.textContent += line + '\n'; });
    el.scrollTop = el.scrollHeight;
    logSinceMap[key] = r.data.total;
  }
}

async function fetchAllLogs() {
  var logNodes = getLogNodes();
  for (var i = 0; i < logNodes.length; i++) {
    await fetchNodeLogs(logNodes[i]);
  }
}

function toggleAutoLogs() {
  var btn = document.getElementById('autoLogsBtn');
  if (autoLogsTimer) {
    clearInterval(autoLogsTimer);
    autoLogsTimer = null;
    btn.textContent = 'Enable Auto Refresh';
  } else {
    autoLogsTimer = setInterval(fetchAllLogs, 2000);
    btn.textContent = 'Disable Auto Refresh';
    fetchAllLogs();
  }
}

// ---------------------------------------------------------------------------
// Init: load node list from /config/nodes on page load
// ---------------------------------------------------------------------------
async function init() {
  log('🔄 Loading node list...');
  const r = await api('/config/nodes', 'GET');
  if (r.ok && r.data.nodes) {
    nodes = r.data.nodes;
    if (r.data.allocation_mode) {
      document.getElementById('allocationMode').value = r.data.allocation_mode;
      onModeChange();
    }
    if (r.data.poll_interval) {
      document.getElementById('pollInterval').value = r.data.poll_interval;
    }
  }
  if (!nodes.length) {
    nodes = [{ addr: 'master', vcpu: 1, percentage: 100 }];
  }
  renderWorkers();
  renderPercentageInputs();

  // Load game list
  const gr = await api('/games', 'GET');
  if (gr.ok && gr.data.games) {
    const selects = document.querySelectorAll('.game-select');
    selects.forEach(function(sel) {
      sel.innerHTML = '<option value="">-- Select Game --</option>';
      gr.data.games.forEach(function(g) {
        sel.innerHTML += '<option value="' + g + '">' + g + '</option>';
      });
    });
    log('✅ Loaded ' + gr.data.games.length + ' games');
  }

  log('✅ Page loaded, ' + nodes.length + ' nodes');
}

init();
</script>
