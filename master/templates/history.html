<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">
<title>Simulation History</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #333; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; color: #1a1a2e; }
  .filters { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
  .filters label { font-size: 13px; color: #666; }
  .filters input, .filters select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
  button { padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; color: #fff; margin: 2px; }
  .btn-primary { background: #4a90d9; }
  .btn-primary:hover { background: #357abd; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-success { background: #27ae60; }
  .btn-success:hover { background: #1e8449; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .run-card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 12px; }
  .run-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .run-header h3 { font-size: 14px; color: #333; }
  .run-header span { font-size: 12px; color: #888; }
  .run-detail { display: none; margin-top: 12px; }
  .model-block { border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px; margin-bottom: 8px; }
  .model-block h4 { font-size: 13px; margin-bottom: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
  th, td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; }
  th { background: #f0f0f0; }
  .no-data { text-align: center; color: #999; padding: 40px; font-size: 14px; }
</style>
</head>
<body>

<h1>📜 Simulation History</h1>

<div class="filters">
  <div>
    <label>Model Name</label><br>
    <input type="text" id="filterModel" placeholder="e.g. AmericanChampion">
  </div>
  <div>
    <label>Start Date</label><br>
    <input type="date" id="filterStart">
  </div>
  <div>
    <label>End Date</label><br>
    <input type="date" id="filterEnd">
  </div>
  <button class="btn-primary" onclick="search()">Search</button>
  <button class="btn-primary" onclick="loadAll()">Show All</button>
</div>

<div id="results"></div>

<script>
function fmt(v) {
  if (v === null || v === undefined) return '-';
  return typeof v === 'number' ? v.toLocaleString() : v;
}
function fmtPct(v) {
  if (v === null || v === undefined) return '-';
  return (v * 100).toFixed(4) + '%';
}

async function loadAll() {
  var r = await fetch('/history/list');
  var data = await r.json();
  renderRuns(data.runs || []);
}

async function search() {
  var model = document.getElementById('filterModel').value;
  var start = document.getElementById('filterStart').value;
  var end = document.getElementById('filterEnd').value;
  var params = new URLSearchParams();
  if (model) params.set('model', model);
  if (start) params.set('start', start);
  if (end) params.set('end', end);
  var r = await fetch('/history/query?' + params.toString());
  var data = await r.json();
  renderQueryResults(data.results || []);
}

function renderRuns(runs) {
  var el = document.getElementById('results');
  if (!runs.length) { el.innerHTML = '<div class="no-data">No history data found</div>'; return; }
  var html = '';
  runs.forEach(function(run, i) {
    var ts = run.timestamp ? new Date(run.timestamp).toLocaleString() : run.filename;
    html += '<div class="run-card">';
    html += '<div class="run-header">';
    html += '<h3 style="flex:1;cursor:pointer;" onclick="toggleRun(\'run_' + i + '\', \'' + run.filename + '\')">📅 ' + ts + '</h3>';
    html += '<span style="margin-right:8px;">' + run.model_count + ' models</span>';
    html += '<button class="btn-success btn-sm" onclick="event.stopPropagation();downloadRun(\'' + run.filename + '\')">⬇ Download</button>';
    html += '</div>';
    html += '<div class="run-detail" id="run_' + i + '"></div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function renderQueryResults(results) {
  window._queryResults = results;  // store for download
  var el = document.getElementById('results');
  if (!results.length) { el.innerHTML = '<div class="no-data">No matching results</div>'; return; }
  var html = '';
  results.forEach(function(record, i) {
    var ts = record.timestamp ? new Date(record.timestamp).toLocaleString() : '';
    var fname = record.timestamp ? record.timestamp.replace(/[:.]/g, '-') + '.json' : 'result_' + i + '.json';
    html += '<div class="run-card">';
    html += '<div class="run-header">';
    html += '<h3 style="flex:1;cursor:pointer;" onclick="toggleRunInline(\'qrun_' + i + '\')">📅 ' + ts + '</h3>';
    html += '<span style="margin-right:8px;">' + Object.keys(record.models || {}).length + ' models</span>';
    html += '<button class="btn-success btn-sm" onclick="event.stopPropagation();downloadQueryResult(' + i + ')">⬇ Download</button>';
    html += '</div>';
    html += '<div class="run-detail" id="qrun_' + i + '" style="display:none;">';
    html += renderModels(record.models || {});
    html += '</div></div>';
  });
  el.innerHTML = html;
}

async function toggleRun(divId, filename) {
  var el = document.getElementById(divId);
  if (el.style.display === 'block') { el.style.display = 'none'; return; }
  if (el.dataset.loaded) { el.style.display = 'block'; return; }
  var r = await fetch('/history/load?filename=' + encodeURIComponent(filename));
  var data = await r.json();
  el.innerHTML = renderModels(data.models || {});
  el.dataset.loaded = '1';
  el.style.display = 'block';
}

function toggleRunInline(divId) {
  var el = document.getElementById(divId);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

var _histChartCounter = 0;

function renderModels(models) {
  var html = '';
  var names = Object.keys(models).sort();
  names.forEach(function(name) {
    var m = models[name];
    var latest = m.latest || m;
    var history = m.history || [];
    var mid = 'hm_' + (_histChartCounter++);
    var detailId = mid + '_detail';
    var histId = mid + '_hist';
    var chartId = mid + '_chart';

    html += '<div class="model-block">';
    html += '<div style="display:flex;align-items:center;gap:8px;">';
    html += '<h4 style="cursor:pointer;" onclick="toggleEl(\'' + detailId + '\')">▶ ' + name + '</h4>';
    html += '<button class="btn-primary btn-sm" onclick="event.stopPropagation();copyModelTable(\'' + detailId + '\',this)">📋 Copy</button>';
    if (history.length > 1) {
      html += '<button class="btn-primary btn-sm" onclick="toggleVolcano(\'' + chartId + '\',\'' + mid + '\')">📊 Volcano</button>';
    }
    html += '</div>';

    // Volcano chart (hidden)
    html += '<div id="' + chartId + '" style="display:none;margin:8px 0;"><canvas id="canvas_' + mid + '" width="600" height="200" style="width:100%;border:1px solid #ddd;border-radius:4px;"></canvas></div>';

    // Collapsible detail (hidden by default)
    html += '<div id="' + detailId + '" style="display:none;">';
    html += '<table><tr><th>Metric</th><th>Value</th></tr>';
    html += '<tr><td>SPIN COUNT</td><td>' + fmt(latest.spin_count) + '</td></tr>';
    html += '<tr><td>TOTAL RTP</td><td>' + fmtPct(latest.total_rtp) + '</td></tr>';
    html += '<tr><td>BASE RTP</td><td>' + fmtPct(latest.base_rtp) + '</td></tr>';
    html += '<tr><td>EB RTP</td><td>' + fmtPct(latest.eb_rtp) + '</td></tr>';
    html += '</table>';

    if (history.length > 0) {
      html += '<div style="margin-top:6px;"><span style="font-size:12px;cursor:pointer;color:#666;" onclick="toggleEl(\'' + histId + '\')">▶ History (' + history.length + ' snapshots)</span>';
      html += '<div id="' + histId + '" style="display:none;">';
      html += '<table style="margin-top:4px;"><tr><th>SPIN COUNT</th><th>TOTAL RTP</th><th>BASE RTP</th><th>EB RTP</th></tr>';
      history.forEach(function(h) {
        html += '<tr><td>' + fmt(h.spin_count) + '</td><td>' + fmtPct(h.total_rtp) + '</td><td>' + fmtPct(h.base_rtp) + '</td><td>' + fmtPct(h.eb_rtp) + '</td></tr>';
      });
      html += '</table></div></div>';
    }

    html += '</div></div>';

    // Store history data for chart
    if (!window._histModels) window._histModels = {};
    window._histModels[mid] = history;
  });
  return html;
}

function toggleEl(id) {
  var el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function toggleVolcano(chartId, mid) {
  var el = document.getElementById(chartId);
  if (!el) return;
  if (el.style.display === 'none') {
    el.style.display = 'block';
    drawHistVolcano('canvas_' + mid, mid);
  } else {
    el.style.display = 'none';
  }
}

function drawHistVolcano(canvasId, mid) {
  var canvas = document.getElementById(canvasId);
  if (!canvas || !window._histModels || !window._histModels[mid]) return;
  var history = window._histModels[mid];
  if (history.length < 2) return;

  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  var pad = {top: 20, right: 20, bottom: 30, left: 60};
  var plotW = w - pad.left - pad.right;
  var plotH = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#fafafa';
  ctx.fillRect(0, 0, w, h);

  var spins = history.map(function(h) { return h.spin_count || 0; });
  var maxSpin = Math.max.apply(null, spins);
  var minSpin = Math.min.apply(null, spins);
  if (maxSpin === minSpin) maxSpin = minSpin + 1;

  var series = [
    {key: 'total_rtp', label: 'TOTAL RTP', color: '#e74c3c'},
    {key: 'base_rtp', label: 'BASE RTP', color: '#2980b9'},
    {key: 'eb_rtp', label: 'EB RTP', color: '#27ae60'},
  ];

  var allVals = [];
  series.forEach(function(s) { history.forEach(function(h) { allVals.push(h[s.key] || 0); }); });
  var minRtp = Math.min.apply(null, allVals) * 0.998;
  var maxRtp = Math.max.apply(null, allVals) * 1.002;
  if (maxRtp === minRtp) maxRtp = minRtp + 0.01;

  // Axes
  ctx.strokeStyle = '#999'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, h - pad.bottom); ctx.lineTo(w - pad.right, h - pad.bottom); ctx.stroke();

  // Y labels
  ctx.fillStyle = '#666'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
  for (var i = 0; i <= 4; i++) {
    var yVal = minRtp + (maxRtp - minRtp) * i / 4;
    var yPos = h - pad.bottom - (i / 4) * plotH;
    ctx.fillText((yVal * 100).toFixed(2) + '%', pad.left - 4, yPos + 3);
    ctx.strokeStyle = '#eee'; ctx.beginPath(); ctx.moveTo(pad.left, yPos); ctx.lineTo(w - pad.right, yPos); ctx.stroke();
  }

  // Lines
  series.forEach(function(s) {
    var vals = history.map(function(h) { return h[s.key] || 0; });
    ctx.strokeStyle = s.color; ctx.lineWidth = 2; ctx.beginPath();
    for (var j = 0; j < vals.length; j++) {
      var x = pad.left + (spins[j] - minSpin) / (maxSpin - minSpin) * plotW;
      var y = h - pad.bottom - (vals[j] - minRtp) / (maxRtp - minRtp) * plotH;
      if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.fillStyle = s.color;
    for (var k = 0; k < vals.length; k++) {
      var dx = pad.left + (spins[k] - minSpin) / (maxSpin - minSpin) * plotW;
      var dy = h - pad.bottom - (vals[k] - minRtp) / (maxRtp - minRtp) * plotH;
      ctx.beginPath(); ctx.arc(dx, dy, 3, 0, Math.PI * 2); ctx.fill();
    }
  });

  // Legend
  var lx = pad.left + 10, ly = pad.top + 4;
  series.forEach(function(s, i) {
    ctx.fillStyle = s.color; ctx.fillRect(lx, ly + i * 14, 10, 10);
    ctx.fillStyle = '#333'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(s.label, lx + 14, ly + i * 14 + 9);
  });

  ctx.fillStyle = '#666'; ctx.textAlign = 'center';
  ctx.fillText('SPIN COUNT', w / 2, h - 4);
}

function copyModelTable(detailId, btnEl) {
  var el = document.getElementById(detailId);
  if (!el) return;
  var tables = el.querySelectorAll('table');
  var text = '';
  tables.forEach(function(table) {
    table.querySelectorAll('tr').forEach(function(row) {
      var cells = row.querySelectorAll('th, td');
      var line = [];
      cells.forEach(function(cell) { line.push(cell.textContent.trim()); });
      text += line.join('\t') + '\n';
    });
    text += '\n';
  });
  navigator.clipboard.writeText(text.trim()).then(function() {
    if (btnEl) {
      var orig = btnEl.textContent;
      btnEl.textContent = '✅ Copied';
      btnEl.disabled = true;
      setTimeout(function() { btnEl.textContent = orig; btnEl.disabled = false; }, 3000);
    }
  });
}

async function downloadRun(filename) {
  var r = await fetch('/history/load?filename=' + encodeURIComponent(filename));
  var data = await r.json();
  downloadJson(JSON.stringify(data, null, 2), filename);
}

function downloadJson(jsonStr, filename) {
  var blob = new Blob([jsonStr], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadQueryResult(index) {
  if (!window._queryResults || !window._queryResults[index]) return;
  var record = window._queryResults[index];
  var ts = record.timestamp ? record.timestamp.replace(/[:.]/g, '-') : 'result_' + index;
  downloadJson(JSON.stringify(record, null, 2), ts + '.json');
}

loadAll();
</script>
</body>
</html>
